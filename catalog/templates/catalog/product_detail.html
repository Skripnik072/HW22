{% extends 'catalog/base_prod.html' %}
{% block content %}

<style>
        img {
            width: 200px;
            height: 150px;
            object-fit: cover;
            }

</style>
   <div class="content-area">
    <h1 class="text-center" style="padding: 30px">Продукт</h1>
    <div class="row">

        <div class="col-md-4 mb-4">
        <div class="card">
        <div class="card-header" >
        <div class="center-items">
        <img src="/media/{{ product.photo }}">
        </div>
        </div>
        <div class="card-body">
        <p class="card-text" style="text-align: center" > {{ object.name }} )</p>
        <p class="card-text" style="text-align: center" > {{ object.description|truncatechars:100 }}</p>
        <p class="card-text" style="text-align: center" > Цена за 1 кг {{ object.price }} руб.</p>
        <a href="#" class="btn btn-outline-primary" >View</a>
        <a href="#" class="btn btn-outline-primary" >Edit</a>
        <h6 style="text-align: right">9 mins</h6>
        </div>
        </div>
      </div>

    </div>
    </div>
        {% endblock %}
