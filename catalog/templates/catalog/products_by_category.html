{% extends 'catalog/base_prod.html' %}
{% block content %}

<style>
        img {
            width: 200px;
            height: 150px;
            object-fit: cover;
            }

</style>
   <div class="content-area">
    <h1 class="text-center" style="padding: 30px">Продукты выбранной категории</h1>

    <div class="row">

      {% for product in prodcat %}
        <div class="col-md-4 mb-4">
        <div class="card">
        <div class="card-header" >
        <div class="center-items">
        <img src="/media/{{ product.photo }}">
        </div>
        </div>
        <div class="card-body">
        <p class="card-text" style="text-align: center" > {{ product.name }} </p>
        <p class="card-text" style="text-align: center" > {{ product.description }}</p>
        <p class="card-text" style="text-align: center" > Цена за 1 кг {{ product.price }} руб.</p>

        </div>
        </div>
      </div>
        {% endfor %}
    </div>
       <a href="{% url 'catalog:product_list' %}" class="btn btn-primary">Возврат в каталог продуктов</a>
    </div>
        {% endblock %}
